name: CORA CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guardrails:
    name: Guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block corpus, secrets, and local artifacts
        shell: bash
        run: |
          set -euo pipefail

          forbidden_pattern='(^|/)corpus/|(^|/)respostas?\.md$|(^|/)pompt-desenvolvimento-formatacao\.md$|backend/prompts/.*backup|firebase-adminsdk.*\.json|(^|/)\.env$|(^|/)\.env\.docker$|(^|/)backend/\.env$|(^|/)frontend/\.env$'
          matches="$(git ls-files | grep -E "$forbidden_pattern" || true)"

          if [ -n "$matches" ]; then
            echo "Forbidden tracked files detected:"
            echo "$matches"
            exit 1
          fi

      - name: Verify CORA assistant contracts
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'PINECONE_NAMESPACE=notas_conflito_interesse' .env.railway.example
          grep -q 'PINECONE_NAMESPACE: "notas_conflito_interesse"' docker-compose.yml
          grep -q 'GEMINI_MODEL=gemini-3.1-flash-lite' .env.railway.example
          grep -q 'GEMINI_MODEL=gemini-3.1-flash-lite' .env.docker.example
          grep -q 'FIREBASE_SERVICE_ACCOUNT_JSON' .env.railway.example
          grep -q 'FIREBASE_SERVICE_ACCOUNT_FILE' .env.docker.example

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run focused backend tests
        shell: bash
        working-directory: backend
        run: |
          set -euo pipefail
          PYTHONPATH="$PWD" python -m pytest \
            tests/test_context_excerpt.py \
            tests/test_retrieval_context.py \
            tests/test_chat_formatter.py \
            tests/test_response_cleaning.py \
            tests/test_pdf_markdown_rendering.py

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: CI=false npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - guardrails
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t cora-ci:${{ github.sha }} .
